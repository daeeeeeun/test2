<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 마음 조각</title>
    <style>
        /* CSS: 디자인 설정 */
        :root {
            --main-yellow: #FFD233;
            --light-yellow: #FFF9E6;
            --text-grey: #4A4A4A;
            --bg-white: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-white);
            color: var(--text-grey);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 150px;
            border: 2px solid #F0F0F0;
            border-radius: 15px;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--main-yellow);
        }

        button {
            margin-top: 20px;
            background-color: var(--main-yellow);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(255, 210, 51, 0.3);
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* 결과 창 스타일 */
        #result-section {
            margin-top: 40px;
            display: none;
            background-color: var(--light-yellow);
            padding: 25px;
            border-radius: 20px;
            animation: fadeIn 0.8s ease-in-out;
        }

        .comment {
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .song-card {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--main-yellow);
            display: inline-block;
            width: 80%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>오늘의 마음 조각</h1>
    <p class="subtitle">당신의 오늘을 들려주세요. 노래를 선물할게요.</p>
    
    <textarea id="userInput" placeholder="지금 어떤 기분이신가요? 편하게 이야기해주세요..."></textarea>
    <br>
    <button onclick="analyzeFeeling()">마음 전송하기</button>

    <div id="result-section">
        <p id="commentDisplay" class="comment"></p>
        <div class="song-card">
            <strong>추천 곡:</strong> <span id="songDisplay"></span>
        </div>
    </div>
</div>

<script>
    // JavaScript: 버튼 클릭 시 작동하는 기능
    function analyzeFeeling() {
        const text = document.getElementById('userInput').value;
        const resultSection = document.getElementById('result-section');
        
        if (text.trim() === "") {
            alert("이야기를 들려주셔야 노래를 추천해드릴 수 있어요!");
            return;
        }

        // 간단한 키워드 기반 로직 (추후 AI API 등으로 확장 가능)
        let comment = "";
        let song = "";

        if (text.includes("힘들어") || text.includes("우울") || text.includes("슬퍼")) {
            comment = "많이 고된 하루였나 보네요. 잠시 모든 짐을 내려놓고 이 음악과 함께 쉬어가는 건 어떨까요?";
            song = "옥상달빛 - 수고했어, 오늘도";
        } else if (text.includes("기뻐") || text.includes("신나") || text.includes("좋아")) {
            comment = "당신의 밝은 에너지가 여기까지 느껴져요! 이 기분을 더 끌어올려 줄 곡을 준비했습니다.";
            song = "Pharrell Williams - Happy";
        } else if (text.includes("피곤") || text.includes("졸려") || text.includes("지쳐")) {
            comment = "애쓰느라 고생 많았어요. 포근한 이불 속에서 듣기 좋은 노래예요.";
            song = "아이유 - 밤편지";
        } else {
            comment = "들려주신 이야기를 가만히 들어보았어요. 당신의 무드에 어울리는 잔잔한 선곡입니다.";
            song = "짙은 - 잘 지내자, 우리";
        }

        // 결과 업데이트
        document.getElementById('commentDisplay').innerText = comment;
        document.getElementById('songDisplay').innerText = song;
        
        // 결과창 보여주기
        resultSection.style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
